name: Deploy At UAT

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy UAT
    runs-on: ubuntu-latest

    steps:
     - name: Download Build Artifact
       uses: actions/download-artifact@v4
       with:
         name: frontend-build
         path: deploy

     - name: show download files
       uses: ls -R deploy

     - name: Deploy Application
       run: echo "🚀 Application deployed to UAT successfully!" 
  
  deploy-uat:
  name: Deploy to UAT
  needs: build
  runs-on: ubuntu-latest

  steps:
    - name: Download Build Artifact
      uses: actions/download-artifact@v4
      with:
        name: frontend-build
        path: deploy

    - name: Verify Downloaded Files
      run: ls -R deploy

    - name: Simulate Deployment
      run: echo "🚀 Application deployed to UAT successfully!"     

name:  CI/CD Pipeline

on:
  push:
    branches:
      - "main"

  pull_request:
    branches:
      - "main"

jobs:
  build:
    name: Build React Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "yarn"
      - name: Install Dependencies    
        run: yarn install --frozen-lockfile

      - name: Run Eslint
        run: yarn lint

      - name: Run Tests
        run: yarn test

      - name: Build Project
        run: yarn build

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: build
  
  deploy-uat:
    name: Deploy To UAT
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: uat

    steps:
      - name: Download Artifact Build
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: deploy

      - name: Verify Downloaded Files
        run: ls -R deploy

      - name: Simulate Deployment
        run: echo "🚀 Application deployed to UAT successfully!"
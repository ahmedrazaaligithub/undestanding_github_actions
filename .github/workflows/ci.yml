name:  React Vite CI

on:
  push:
    branches:
      ["main"]

  pull_request:
    branches:
      ["main"]

jobs:
  build:
    name: Build React Application
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: "yarn"
    - run: yarn install --frozen-lockfile # install dependencies
    - run: yarn build
    # - run: npm test
